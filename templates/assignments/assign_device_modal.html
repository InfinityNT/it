{% load static %}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Assign Device</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form method="post" hx-post="{% url 'assign-device' %}" hx-swap="outerHTML" hx-target="#dynamicModalContent">
    {% csrf_token %}
    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <!-- Usage Type Toggle -->
        <div class="mb-3">
            <label class="form-label">Usage Type</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="usage_mode" id="mode_individual" value="individual" checked>
                <label class="btn btn-outline-primary" for="mode_individual">
                    <i class="bi bi-person me-1"></i>Individual
                </label>
                <input type="radio" class="btn-check" name="usage_mode" id="mode_shared" value="shared">
                <label class="btn btn-outline-primary" for="mode_shared">
                    <i class="bi bi-people me-1"></i>Shared
                </label>
            </div>
            <small class="form-text text-muted" id="usage_mode_help">Assign to a single employee</small>
        </div>

        <div class="mb-3">
            <label for="device" class="form-label">Device *</label>
            <select class="form-select" id="device" name="device" required {% if preselected_device %}disabled{% endif %}>
                <option value="">Select Device</option>
                {% for device in available_devices %}
                <option value="{{ device.id }}"
                        data-usage-type="{{ device.usage_type }}"
                        {% if preselected_device and device.id == preselected_device.id %}selected{% endif %}>
                    {{ device.asset_tag }} - {{ device.device_model }}
                </option>
                {% endfor %}
            </select>
            {% if preselected_device %}
            <input type="hidden" name="device" value="{{ preselected_device.id }}">
            <small class="form-text text-muted">Device preselected from list</small>
            {% endif %}
        </div>
        <div class="mb-3">
            <label for="employee" class="form-label">Employee *</label>
            <select class="form-select" id="employee" name="employee" required>
                <option value="">Select Employee</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}"
                        data-is-responsible="{{ emp.is_department_responsible|yesno:'true,false' }}"
                        data-department="{{ emp.department_id|default:'' }}">
                    {{ emp.get_full_name }} ({{ emp.employee_id }})
                    {% if emp.is_department_responsible %} [Dept. Responsible]{% endif %}
                </option>
                {% endfor %}
            </select>
            <!-- Override checkbox for shared mode -->
            <div id="override-container" class="form-check mt-1" style="display: none;">
                <input class="form-check-input" type="checkbox" id="override_responsible">
                <label class="form-check-label small text-muted" for="override_responsible">
                    Show all employees (override department responsible filter)
                </label>
            </div>
        </div>
        <div class="mb-3">
            <label for="assignment_type" class="form-label">Assignment Type *</label>
            <select class="form-select" id="assignment_type" name="assignment_type" required>
                <option value="">Select Type</option>
                <option value="Permanent">Permanent</option>
                <option value="Temporary">Temporary</option>
                <option value="Loan">Loan</option>
                <option value="Trial">Trial</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="purpose" class="form-label">Purpose</label>
            <input type="text" class="form-control" id="purpose" name="purpose"
                   placeholder="e.g., Development, Testing, Training">
        </div>
        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <input type="text" class="form-control" id="location" name="location"
                   placeholder="e.g., Building A, Floor 2">
        </div>
        <div class="mb-3">
            <label for="expected_return_date" class="form-label">Expected Return Date</label>
            <input type="date" class="form-control" id="expected_return_date" name="expected_return_date">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check me-1"></i>Assign Device</button>
    </div>
</form>

<script>
(function() {
    const modeRadios = document.querySelectorAll('input[name="usage_mode"]');
    const deviceSelect = document.getElementById('device');
    const employeeSelect = document.getElementById('employee');
    const overrideContainer = document.getElementById('override-container');
    const overrideCheckbox = document.getElementById('override_responsible');
    const usageModeHelp = document.getElementById('usage_mode_help');

    // Store all employee options
    const allEmployeeOptions = [...employeeSelect.querySelectorAll('option[value]')];

    function filterEmployees() {
        const isShared = document.getElementById('mode_shared').checked;
        const override = overrideCheckbox && overrideCheckbox.checked;

        // Restore all options first
        const currentValue = employeeSelect.value;
        employeeSelect.innerHTML = '<option value="">Select Employee</option>';

        allEmployeeOptions.forEach(option => {
            if (isShared && !override) {
                // In shared mode without override, only show department responsibles
                if (option.dataset.isResponsible === 'true') {
                    employeeSelect.appendChild(option.cloneNode(true));
                }
            } else {
                employeeSelect.appendChild(option.cloneNode(true));
            }
        });

        // Try to restore selection
        if (currentValue) {
            employeeSelect.value = currentValue;
        }
    }

    // Handle mode toggle
    modeRadios.forEach(radio => {
        radio.addEventListener('change', function() {
            const isShared = this.value === 'shared';
            overrideContainer.style.display = isShared ? 'block' : 'none';
            usageModeHelp.textContent = isShared
                ? 'Assign to a department responsible for shared use'
                : 'Assign to a single employee';
            filterEmployees();
        });
    });

    // Handle override checkbox
    if (overrideCheckbox) {
        overrideCheckbox.addEventListener('change', filterEmployees);
    }

    // Auto-detect shared device and switch mode
    if (deviceSelect) {
        deviceSelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            if (selectedOption && selectedOption.dataset.usageType === 'shared') {
                document.getElementById('mode_shared').checked = true;
                overrideContainer.style.display = 'block';
                usageModeHelp.textContent = 'Assign to a department responsible for shared use';
                filterEmployees();
            }
        });
    }
})();
</script>
