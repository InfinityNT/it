{% load static %}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Assign Device</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form method="post" hx-post="{% url 'assign-device' %}" hx-swap="outerHTML" hx-target="#dynamicModalContent">
    {% csrf_token %}
    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div class="mb-3">
            <label for="device" class="form-label">Device *</label>
            <select class="form-select" id="device" name="device" required {% if preselected_device %}disabled{% endif %}>
                <option value="">Select Device</option>
                {% for device in available_devices %}
                <option value="{{ device.id }}" {% if preselected_device and device.id == preselected_device.id %}selected{% endif %}>{{ device.asset_tag }} - {{ device.device_model }}</option>
                {% endfor %}
            </select>
            {% if preselected_device %}
            <input type="hidden" name="device" value="{{ preselected_device.id }}">
            <small class="form-text text-muted">Device preselected from list</small>
            {% endif %}
        </div>
        <div class="mb-3">
            <label for="employee" class="form-label">Employee *</label>
            <select class="form-select" id="employee" name="employee" required>
                <option value="">Select Employee</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.get_full_name }} ({{ emp.employee_id }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="assignment_type" class="form-label">Assignment Type *</label>
            <select class="form-select" id="assignment_type" name="assignment_type" required>
                <option value="">Select Type</option>
                <option value="Permanent">Permanent</option>
                <option value="Temporary">Temporary</option>
                <option value="Loan">Loan</option>
                <option value="Trial">Trial</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="purpose" class="form-label">Purpose</label>
            <input type="text" class="form-control" id="purpose" name="purpose"
                   placeholder="e.g., Development, Testing, Training">
        </div>
        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <input type="text" class="form-control" id="location" name="location"
                   placeholder="e.g., Building A, Floor 2">
        </div>
        <div class="mb-3">
            <label for="expected_return_date" class="form-label">Expected Return Date</label>
            <input type="date" class="form-control" id="expected_return_date" name="expected_return_date">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check me-1"></i>Assign Device</button>
    </div>
</form>
