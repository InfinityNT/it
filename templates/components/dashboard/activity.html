<!-- Dashboard Activity List - Dark Theme -->
<div class="activity-list-dark">
    {% for activity in activities %}
    <div class="activity-item-dark">
        <div class="activity-header-dark">
            <h6 class="activity-title-dark">{{ activity.action }}</h6>
            <small class="activity-time-dark">{{ activity.timestamp|date:"M d, H:i" }}</small>
        </div>
        <p class="activity-description-dark">{{ activity.description }}</p>
        <small class="activity-user-dark">by {{ activity.user }}</small>
    </div>
    {% empty %}
    <div class="activity-empty-dark">
        <i class="bi bi-clock-history"></i>
        <p>No recent activity</p>
    </div>
    {% endfor %}
</div>
