<!-- Dashboard Stats - Dark Theme -->
<div class="stats-grid">
    <div class="stat-card-dark stat-primary">
        <div class="stat-icon-dark">
            <i class="bi bi-laptop"></i>
        </div>
        <div class="stat-content-dark">
            <div class="stat-value-dark">{{ total_devices|default:0 }}</div>
            <div class="stat-label-dark">Total Devices</div>
        </div>
    </div>

    <div class="stat-card-dark stat-success">
        <div class="stat-icon-dark">
            <i class="bi bi-check-circle"></i>
        </div>
        <div class="stat-content-dark">
            <div class="stat-value-dark">{{ available_devices|default:0 }}</div>
            <div class="stat-label-dark">Available</div>
        </div>
    </div>

    <div class="stat-card-dark stat-warning">
        <div class="stat-icon-dark">
            <i class="bi bi-person-check"></i>
        </div>
        <div class="stat-content-dark">
            <div class="stat-value-dark">{{ assigned_devices|default:0 }}</div>
            <div class="stat-label-dark">Assigned</div>
        </div>
    </div>
</div>
