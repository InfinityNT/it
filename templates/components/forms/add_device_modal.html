{% load static %}

<!-- Add Device Modal -->
<div class="modal fade" id="addDeviceModal" tabindex="-1" aria-labelledby="addDeviceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addDeviceModalLabel">
                    <i class="bi bi-laptop me-2"></i>
                    Add New Device
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form method="post" 
                      hx-post="{% url 'add-device' %}" 
                      hx-target="#modal-container" 
                      hx-swap="innerHTML"
                      hx-indicator="#save-spinner">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="asset_tag" class="form-label">Asset Tag *</label>
                                <input type="text" class="form-control" id="asset_tag" name="asset_tag" required 
                                       pattern="[A-Z0-9-]+" title="Only uppercase letters, numbers, and hyphens allowed">
                                <div class="form-text">Organization asset tracking number</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="hostname" class="form-label">Hostname *</label>
                                <input type="text" class="form-control" id="hostname" name="hostname" required>
                                <div class="form-text">Default: MEX-[last 6 of serial]</div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="serial_number" class="form-label">Serial Number *</label>
                                <input type="text" class="form-control" id="serial_number" name="serial_number" required>
                                <div class="form-text">Manufacturer's serial number</div>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="category" class="form-label">Category *</label>
                                <select class="form-select" id="category" name="category" required>
                                    <option value="">Select Category</option>
                                    <!-- Categories will be populated dynamically -->
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="manufacturer" class="form-label">Manufacturer *</label>
                                <select class="form-select" id="manufacturer" name="manufacturer" required>
                                    <option value="">Select Manufacturer</option>
                                    <!-- Manufacturers will be populated dynamically -->
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="model" class="form-label">Model *</label>
                                <input type="text" class="form-control" id="model" name="model" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="location" class="form-label">Location</label>
                                <select class="form-select" id="location" name="location">
                                    <option value="">Select Location</option>
                                    <!-- Locations will be populated dynamically -->
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="status" class="form-label">Status *</label>
                                <select class="form-select" id="status" name="status" required>
                                    <option value="available">Available</option>
                                    <option value="assigned">Assigned</option>
                                    <option value="maintenance">Maintenance</option>
                                    <option value="retired">Retired</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="condition" class="form-label">Condition *</label>
                                <select class="form-select" id="condition" name="condition" required>
                                    <option value="excellent">Excellent</option>
                                    <option value="good">Good</option>
                                    <option value="fair">Fair</option>
                                    <option value="poor">Poor</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3" 
                                  placeholder="Additional notes about this device..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" form="addDeviceForm" class="btn btn-primary">
                    <span id="save-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
                    <i class="bi bi-check-lg me-1"></i>
                    Save Device
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// Show the modal when loaded
document.addEventListener('DOMContentLoaded', function() {
    var modal = new bootstrap.Modal(document.getElementById('addDeviceModal'));
    modal.show();
});
</script>
