{% load static %}

<div class="modal-header">
    <h5 class="modal-title">
        <i class="bi bi-person-plus me-2"></i>
        Add New User
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form method="post"
      id="addUserForm"
      hx-post="{% url 'add-user-modal' %}"
      hx-target="#dynamicModalContent"
      hx-swap="innerHTML"
      hx-indicator="#user-save-spinner">
    {% csrf_token %}
    <div class="modal-body">
        <!-- Basic Information -->
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="username" class="form-label">Username *</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                    <div class="form-text">Unique username for login</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="employee_id" class="form-label">Employee ID</label>
                    <input type="text" class="form-control" id="employee_id" name="employee_id">
                    <div class="form-text">Organization employee identifier</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="first_name" class="form-label">First Name *</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name *</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" required>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email Address *</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <!-- Groups/Permissions -->
        <div class="mb-3">
            <label for="groups" class="form-label">User Groups</label>
            <select class="form-select" id="groups" name="groups" multiple>
                {% for group in available_groups %}
                    <option value="{{ group.id }}">{{ group.name }}</option>
                {% empty %}
                    <option value="" disabled>No groups available</option>
                {% endfor %}
            </select>
            <div class="form-text">Hold Ctrl/Cmd to select multiple groups</div>
        </div>

        <!-- Password Settings -->
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="password1" class="form-label">Password *</label>
                    <input type="password" class="form-control" id="password1" name="password1" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="password2" class="form-label">Confirm Password *</label>
                    <input type="password" class="form-control" id="password2" name="password2" required>
                </div>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="password_change_required" name="password_change_required" checked>
                <label class="form-check-label" for="password_change_required">
                    Require password change on first login
                </label>
            </div>
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="is_active" name="is_active" checked>
                <label class="form-check-label" for="is_active">
                    Active user account
                </label>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">
            <span id="user-save-spinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
            <i class="bi bi-check-lg me-1"></i>
            Create User
        </button>
    </div>
</form>
