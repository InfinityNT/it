{% load static %}
<div class="modal-header">
    <h5 class="modal-title">
        <i class="bi bi-upload me-2"></i>Import Employees from Excel
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<div class="modal-body">
    <!-- Step 1: Download Template -->
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title">
                <span class="badge bg-primary me-2">Step 1</span>
                Download Template
            </h6>
            <p class="card-text text-muted small mb-2">
                Download the Excel template, fill in employee data, then upload it below.
            </p>
            <a href="{% url 'employee-import-template' %}" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-download me-1"></i>Download Template
            </a>
        </div>
    </div>

    <!-- Step 2: Upload File -->
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title">
                <span class="badge bg-primary me-2">Step 2</span>
                Upload Excel File
            </h6>
            <form id="importEmployeesForm" enctype="multipart/form-data">
                <div class="mb-0">
                    <label for="importFile" class="form-label">Select Excel File (.xlsx)</label>
                    <input type="file"
                           class="form-control"
                           id="importFile"
                           name="file"
                           accept=".xlsx,.xls"
                           required>
                    <div class="form-text">Maximum file size: 5MB</div>
                </div>
            </form>
        </div>
    </div>

    <!-- Progress indicator -->
    <div id="importProgress" class="d-none">
        <div class="text-center py-4">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Processing...</span>
            </div>
            <p class="mt-2 mb-0 text-muted">Processing import file...</p>
        </div>
    </div>

    <!-- Results Area (hidden initially) -->
    <div id="importResultsArea" class="d-none">
        <div class="card">
            <div class="card-header">
                <h6 class="mb-0">Import Results</h6>
            </div>
            <div class="card-body" id="importResultsContent">
                <!-- Results will be populated here -->
            </div>
        </div>
    </div>
</div>

<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="button" class="btn btn-primary" id="startImportBtn" onclick="startEmployeeImport()">
        <i class="bi bi-upload me-1"></i>Import Employees
    </button>
</div>

<script>
function startEmployeeImport() {
    const fileInput = document.getElementById('importFile');
    const file = fileInput.files[0];

    if (!file) {
        showToast('warning', 'Please select a file to import');
        return;
    }

    // Validate file type
    if (!file.name.match(/\.(xlsx|xls)$/i)) {
        showToast('error', 'Please select a valid Excel file (.xlsx or .xls)');
        return;
    }

    // Validate file size (5MB max)
    if (file.size > 5 * 1024 * 1024) {
        showToast('error', 'File size exceeds 5MB limit');
        return;
    }

    // Show progress, hide results
    document.getElementById('importProgress').classList.remove('d-none');
    document.getElementById('importResultsArea').classList.add('d-none');
    document.getElementById('startImportBtn').disabled = true;

    // Create FormData and submit
    const formData = new FormData();
    formData.append('file', file);

    fetch('/employees/api/import/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': getCookie('csrftoken'),
        },
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('importProgress').classList.add('d-none');
        document.getElementById('startImportBtn').disabled = false;

        if (data.error) {
            showToast('error', data.error);
            return;
        }

        // Show results
        displayImportResults(data);

        // Show success toast
        if (data.success_count > 0) {
            showToast('success', data.message);
        }
    })
    .catch(error => {
        document.getElementById('importProgress').classList.add('d-none');
        document.getElementById('startImportBtn').disabled = false;
        showToast('error', 'Import failed: ' + error.message);
    });
}

function displayImportResults(data) {
    const resultsArea = document.getElementById('importResultsArea');
    const resultsContent = document.getElementById('importResultsContent');

    let html = '';

    // Summary
    html += `
        <div class="row mb-3">
            <div class="col-4 text-center">
                <div class="border rounded p-2">
                    <h4 class="text-success mb-0">${data.success_count}</h4>
                    <small class="text-muted">Imported</small>
                </div>
            </div>
            <div class="col-4 text-center">
                <div class="border rounded p-2">
                    <h4 class="text-danger mb-0">${data.error_count}</h4>
                    <small class="text-muted">Errors</small>
                </div>
            </div>
            <div class="col-4 text-center">
                <div class="border rounded p-2">
                    <h4 class="text-secondary mb-0">${data.success_count + data.error_count}</h4>
                    <small class="text-muted">Total Rows</small>
                </div>
            </div>
        </div>
    `;

    // Error details
    if (data.results && data.results.errors && data.results.errors.length > 0) {
        html += `
            <div class="mt-3">
                <h6 class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i>Errors (${data.results.errors.length})</h6>
                <div class="table-responsive" style="max-height: 200px; overflow-y: auto;">
                    <table class="table table-sm table-bordered">
                        <thead class="table-light">
                            <tr>
                                <th>Row</th>
                                <th>Employee ID</th>
                                <th>Error</th>
                            </tr>
                        </thead>
                        <tbody>
        `;

        data.results.errors.forEach(error => {
            html += `
                <tr>
                    <td>${error.row}</td>
                    <td>${error.employee_id}</td>
                    <td class="text-danger small">${error.errors.join('; ')}</td>
                </tr>
            `;
        });

        html += `
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }

    // Success details (collapsed by default)
    if (data.results && data.results.success && data.results.success.length > 0) {
        html += `
            <div class="mt-3">
                <a class="text-success small" data-bs-toggle="collapse" href="#successDetails" role="button">
                    <i class="bi bi-check-circle me-1"></i>
                    Show ${data.results.success.length} successfully imported employees
                </a>
                <div class="collapse mt-2" id="successDetails">
                    <div class="table-responsive" style="max-height: 150px; overflow-y: auto;">
                        <table class="table table-sm table-bordered">
                            <thead class="table-light">
                                <tr>
                                    <th>Row</th>
                                    <th>Employee ID</th>
                                    <th>Name</th>
                                </tr>
                            </thead>
                            <tbody>
        `;

        data.results.success.forEach(item => {
            html += `
                <tr>
                    <td>${item.row}</td>
                    <td>${item.employee_id}</td>
                    <td>${item.name}</td>
                </tr>
            `;
        });

        html += `
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    }

    resultsContent.innerHTML = html;
    resultsArea.classList.remove('d-none');

    // Refresh employee list if any were imported
    if (data.success_count > 0) {
        // Trigger HTMX refresh on the employees table if it exists
        const employeesTable = document.getElementById('employees-table');
        if (employeesTable) {
            htmx.trigger(employeesTable, 'refresh');
        }
    }
}

// Helper function to get CSRF token (fallback if not defined globally)
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
