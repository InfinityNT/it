<!-- Password Change Content (for HTMX dynamic modal) -->
<div class="modal-header border-0 pb-0">
    <div class="text-center w-100">
        <i class="bi bi-shield-lock display-4 text-warning"></i>
        <h4 class="modal-title mt-3">Change Password</h4>
        <p class="text-muted mb-0">Update your password to keep your account secure.</p>
    </div>
    <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<div class="modal-body pt-2">
    <div id="password-change-errors" class="alert alert-danger" style="display: none;">
        <strong>Error:</strong> <span id="password-error-message"></span>
    </div>

    <form method="post"
          id="password-change-form"
          hx-post="/password-change/"
          hx-swap="none">
        {% csrf_token %}

        <div class="mb-3">
            <label for="current_password" class="form-label">Current Password</label>
            <input type="password"
                   class="form-control"
                   id="current_password"
                   name="current_password"
                   required>
        </div>

        <div class="mb-3">
            <label for="new_password1" class="form-label">New Password</label>
            <input type="password"
                   class="form-control"
                   id="new_password1"
                   name="new_password1"
                   required>
            <div class="form-text">
                Your password must contain at least 8 characters and cannot be too common.
            </div>
        </div>

        <div class="mb-3">
            <label for="new_password2" class="form-label">Confirm New Password</label>
            <input type="password"
                   class="form-control"
                   id="new_password2"
                   name="new_password2"
                   required>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-key me-2"></i>Change Password
            </button>
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                Cancel
            </button>
        </div>
    </form>
</div>

<script>
(function() {
    const form = document.getElementById('password-change-form');
    if (!form) return;

    document.body.addEventListener('htmx:responseError', function handlePwdError(event) {
        if (!event.detail.target || event.detail.target.id !== 'password-change-form') return;

        try {
            const response = JSON.parse(event.detail.xhr.responseText);
            const errorDiv = document.getElementById('password-change-errors');
            const errorMsg = document.getElementById('password-error-message');
            if (errorDiv && errorMsg) {
                errorMsg.textContent = response.error || 'An error occurred';
                errorDiv.style.display = 'block';
            }
        } catch (e) {
            console.error('Error parsing password change response:', e);
        }
    });

    document.body.addEventListener('htmx:afterRequest', function handlePwdSuccess(event) {
        if (!event.detail.target || event.detail.target.id !== 'password-change-form') return;
        if (event.detail.xhr.status === 200) {
            try {
                const response = JSON.parse(event.detail.xhr.responseText);
                if (response.success) {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('dynamicModal'));
                    if (modal) modal.hide();
                    if (typeof showToastNotification === 'function') {
                        showToastNotification(response.message || 'Password changed successfully!', 'success');
                    }
                }
            } catch (e) {
                console.error('Error handling password change success:', e);
            }
        }
    });
})();
</script>
