<!-- Password Change Modal -->
<div class="modal fade" id="passwordChangeModal" tabindex="-1" aria-labelledby="passwordChangeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <div class="text-center w-100">
                    <i class="bi bi-shield-lock display-4 text-warning"></i>
                    <h4 class="modal-title mt-3" id="passwordChangeModalLabel">Password Change Required</h4>
                    <p class="text-muted mb-0">For security reasons, you must change your password before continuing.</p>
                </div>
                <button type="button" class="btn-close position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <div class="modal-body pt-2">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post" 
                      id="password-change-form"
                      hx-post="/password-change/"
                      hx-target="#password-change-form"
                      hx-swap="outerHTML">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="current_password" class="form-label">Current Password</label>
                        <input type="password" 
                               class="form-control" 
                               id="current_password" 
                               name="current_password" 
                               required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="new_password1" class="form-label">New Password</label>
                        <input type="password" 
                               class="form-control" 
                               id="new_password1" 
                               name="new_password1" 
                               required>
                        <div class="form-text">
                            Your password must contain at least 8 characters and cannot be too common.
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="new_password2" class="form-label">Confirm New Password</label>
                        <input type="password" 
                               class="form-control" 
                               id="new_password2" 
                               name="new_password2" 
                               required>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-key me-2"></i>Change Password
                        </button>
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                            Cancel
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <form method="post" action="{% url 'logout' %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-link btn-sm text-muted" style="text-decoration: none;">
                            <i class="bi bi-box-arrow-right me-1"></i>Logout Instead
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
