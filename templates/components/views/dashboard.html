{% load static %}

<!-- Dashboard Container -->
<div class="dashboard-container">
    <!-- Quick Actions Grid -->
    <div class="dashboard-section">
        <h2 class="section-title">
            <i class="bi bi-lightning-fill"></i>
            Quick Actions
        </h2>
        <div class="quick-actions-grid"
             id="dashboard-quick-actions"
             hx-get="/api/dashboard/quick-actions/"
             hx-trigger="load once">
            <!-- Loading state -->
            <div class="loading-placeholder">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Search -->
    <div class="dashboard-section">
        <div class="dash-search-card">
            <div class="search-input-wrapper">
                <form class="d-flex" id="global-search-form" onsubmit="performGlobalSearch(event)">
                    <div class="input-group input-group-lg">
                        <span class="input-group-text dash-search-icon">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text"
                               class="form-control dash-search-input"
                               id="global-search-input"
                               placeholder="Search devices, employees, users, assignments..."
                               autocomplete="off">
                        <button class="btn btn-primary-dash" type="submit">
                            <i class="bi bi-search me-1"></i>
                            Search
                        </button>
                    </div>
                </form>
            </div>
            <div class="mt-2">
                <small class="text-muted-dash">
                    <i class="bi bi-lightbulb me-1"></i>
                    <strong>Quick search:</strong> Try searching by device name, asset tag, employee name
                </small>
            </div>
        </div>
    </div>

    <!-- Search Results (hidden by default) -->
    <div class="dashboard-section" id="search-results-container" style="display: none;">
        <div class="dash-card">
            <div class="dash-card-header d-flex justify-content-between align-items-center">
                <h5 class="dash-card-title mb-0">
                    <i class="bi bi-search me-2"></i>
                    Search Results
                </h5>
                <button class="btn btn-sm btn-outline-secondary-dash" onclick="clearSearch()">
                    <i class="bi bi-x-circle me-1"></i>
                    Clear
                </button>
            </div>
            <div class="dash-card-body" id="search-results-content">
                <!-- Results loaded here -->
            </div>
        </div>
    </div>

    <!-- Stats Section -->
    <div class="dashboard-section">
        <h2 class="section-title">
            <i class="bi bi-bar-chart-fill"></i>
            Overview
        </h2>
        <div id="dashboard-stats"
             hx-get="/api/dashboard/stats/"
             hx-trigger="load once">
            <div class="loading-placeholder">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading statistics...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Activity -->
    <div class="dashboard-section">
        <h2 class="section-title">
            <i class="bi bi-clock-history"></i>
            Recent Activity
        </h2>
        <div class="dash-card">
            <div class="dash-card-body" id="dashboard-activity"
                 hx-get="/api/dashboard/activity/"
                 hx-trigger="load once">
                <div class="loading-placeholder">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading activity...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function performGlobalSearch(event) {
    event.preventDefault();
    const query = document.getElementById('global-search-input').value.trim();

    if (!query) {
        return;
    }

    const resultsContainer = document.getElementById('search-results-container');
    const resultsContent = document.getElementById('search-results-content');

    // Show container and loading state
    resultsContainer.style.display = 'block';
    resultsContent.textContent = '';
    var loadingDiv = document.createElement('div');
    loadingDiv.className = 'loading-placeholder';
    var spinner = document.createElement('div');
    spinner.className = 'spinner-border text-primary';
    spinner.setAttribute('role', 'status');
    var srText = document.createElement('span');
    srText.className = 'visually-hidden';
    srText.textContent = 'Searching...';
    spinner.appendChild(srText);
    loadingDiv.appendChild(spinner);
    resultsContent.appendChild(loadingDiv);

    // Scroll to results
    resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

    // Perform search via HTMX
    htmx.ajax('GET', '/api/global-search/?q=' + encodeURIComponent(query), {
        target: '#search-results-content',
        swap: 'innerHTML'
    });
}

function clearSearch() {
    document.getElementById('global-search-input').value = '';
    document.getElementById('search-results-container').style.display = 'none';
    document.getElementById('search-results-content').textContent = '';
}
</script>
