<!-- Location Add Form (replaces list view) -->
<div class="manage-add-form-section">
    <!-- Back Button -->
    <a class="manage-back-btn"
       hx-get="{% url 'manage-locations' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>

    <h6>Add New Location</h6>

    <form method="post" id="addLocationForm"
          hx-post="{% url 'add-location' %}"
          hx-target="#locations-content"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="name" class="form-label">Location Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name" required
                       placeholder="e.g., Main Office, Warehouse A">
            </div>
            <div class="col-md-6 mb-3">
                <label for="code" class="form-label">Location Code <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="code" name="code" required
                       placeholder="e.g., HQ, WH-A" style="text-transform: uppercase;">
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-end mt-4">
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-locations' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus me-1"></i>Create Location
            </button>
        </div>
    </form>
</div>
