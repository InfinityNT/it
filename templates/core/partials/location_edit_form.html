<div class="manage-list-item editing" id="location-item-{{ location.id }}">
    <form method="post" class="w-100"
          hx-post="{% url 'manage-locations-edit' location_id=location.id %}"
          hx-target="#locations-list"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-2">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row g-2 mb-2">
            <div class="col-md-5">
                <label class="form-label small mb-1">Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-sm" name="name"
                       value="{{ location.name }}" required placeholder="Location name">
            </div>
            <div class="col-md-4">
                <label class="form-label small mb-1">Code <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-sm" name="code"
                       value="{{ location.code }}" required placeholder="Code" style="text-transform: uppercase;">
            </div>
            <div class="col-md-3">
                <label class="form-label small mb-1">Status</label>
                <div class="form-check mt-1">
                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active_{{ location.id }}"
                           {% if location.is_active %}checked{% endif %}>
                    <label class="form-check-label small" for="is_active_{{ location.id }}">Active</label>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-sm btn-success">
                <i class="bi bi-check me-1"></i>Save
            </button>
            <button type="button" class="btn btn-sm btn-secondary"
                    hx-get="{% url 'manage-locations-list' %}"
                    hx-target="#locations-list"
                    hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </form>
</div>
