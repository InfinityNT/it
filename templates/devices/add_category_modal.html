{% load static %}

<!-- Add Device Category Modal -->
<div class="modal-header">
    <h5 class="modal-title">
        <i class="bi bi-tag me-2"></i>Add New Category
    </h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">
    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="post"
          id="addCategoryForm"
          hx-post="{% url 'add-category' %}"
          hx-target="#dynamicModalContent"
          hx-swap="innerHTML">
        {% csrf_token %}

        <div class="mb-3">
            <label for="name" class="form-label">Category Name *</label>
            <input type="text" class="form-control" id="name" name="name" required
                   placeholder="e.g., Laptop, Desktop, Phone, Tablet">
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3"
                      placeholder="Brief description of this device category"></textarea>
        </div>
    </form>
</div>
<div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" form="addCategoryForm" class="btn btn-primary">
        <i class="bi bi-check-lg me-1"></i>Create Category
    </button>
</div>
