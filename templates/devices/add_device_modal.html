{% load static %}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Add New Device</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form method="post" 
      hx-post="{% url 'add-device' %}" 
      hx-target="#dynamicModalContent"
      hx-swap="outerHTML">
    {% csrf_token %}
    
    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div class="row">
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="asset_tag" class="form-label">Asset Tag *</label>
                    <input type="text" class="form-control" id="asset_tag" name="asset_tag" required readonly style="text-transform: uppercase">
                    <div class="form-check mt-1">
                        <input class="form-check-input" type="checkbox" id="custom_asset_tag">
                        <label class="form-check-label small text-muted" for="custom_asset_tag">Custom asset tag</label>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="serial_number" class="form-label">Serial Number *</label>
                    <input type="text" class="form-control" id="serial_number" name="serial_number" required>
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="hostname" class="form-label">Hostname *</label>
                    <input type="text" class="form-control" id="hostname" name="hostname" required readonly>
                    <div class="form-check mt-1">
                        <input class="form-check-input" type="checkbox" id="custom_hostname">
                        <label class="form-check-label small text-muted" for="custom_hostname">Custom hostname</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="category" class="form-label">Category *</label>
                    <select class="form-select" id="category" name="category" required>
                        <option value="">Select Category</option>
                        {% for cat in categories %}
                        <option value="{{ cat.name }}" data-id="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="device_model" class="form-label">Device Model *</label>
                    <select class="form-select" id="device_model" name="device_model" required disabled>
                        <option value="">Select Device Model</option>
                        {% for model in device_models %}
                        <option value="{{ model.id }}" data-category="{{ model.category.name }}">{{ model.manufacturer }} {{ model.model_name }}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text text-muted" id="device_model_helper">Please select a category first</div>
                    <div class="invalid-feedback" id="device_model_error">Please select a device model.</div>
                </div>
            </div>
        </div>

        <!-- Specifications Section -->
        <div class="mb-3">
            <h6 class="border-bottom pb-2">Device Specifications</h6>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="spec_cpu" class="form-label">CPU Model</label>
                    <input type="text" class="form-control" id="spec_cpu" name="spec_cpu" placeholder="e.g., Intel Core i7">
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="spec_ram" class="form-label">RAM</label>
                    <input type="text" class="form-control" id="spec_ram" name="spec_ram" placeholder="e.g., 16 GB DDR4">
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="spec_storage" class="form-label">Storage</label>
                    <input type="text" class="form-control" id="spec_storage" name="spec_storage" placeholder="e.g., 512 GB SSD">
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="spec_gpu" class="form-label">GPU (Optional)</label>
                    <input type="text" class="form-control" id="spec_gpu" name="spec_gpu" placeholder="e.g., NVIDIA RTX 3080">
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="spec_display" class="form-label">Display (Optional)</label>
                    <input type="text" class="form-control" id="spec_display" name="spec_display" placeholder="e.g., 15.6&quot; FHD">
                </div>
            </div>
            <div class="col-md-4">
                <div class="mb-3">
                    <label for="spec_os" class="form-label">Operating System (Optional)</label>
                    <input type="text" class="form-control" id="spec_os" name="spec_os" placeholder="e.g., Windows 11">
                </div>
            </div>
        </div>

        <input type="hidden" name="status" value="available">

        <div class="mb-3">
            <label for="location" class="form-label">Location</label>
            <select class="form-select" id="location" name="location">
                <option value="">Select Location</option>
                {% for location in locations %}
                <option value="{{ location.name }}">{{ location.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="2"></textarea>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check me-1"></i>Save Device
        </button>
    </div>
</form>

<script>
(function() {
    const serialNumberInput = document.getElementById('serial_number');
    const hostnameInput = document.getElementById('hostname');
    const assetTagInput = document.getElementById('asset_tag');
    const deviceModelSelect = document.getElementById('device_model');
    const categorySelect = document.getElementById('category');
    const customHostnameCheckbox = document.getElementById('custom_hostname');
    const customAssetTagCheckbox = document.getElementById('custom_asset_tag');
    const deviceModelHelper = document.getElementById('device_model_helper');

    // Store all device model options for filtering
    const allDeviceModelOptions = [...deviceModelSelect.querySelectorAll('option[data-category]')];

    function generateHostname() {
        const serial = serialNumberInput.value.trim();
        if (serial.length >= 6) {
            hostnameInput.value = 'MEX-' + serial.slice(-6);
        }
    }

    // Auto-generate asset tag from category
    async function generateAssetTag() {
        const selectedOption = categorySelect.options[categorySelect.selectedIndex];
        const categoryId = selectedOption ? selectedOption.dataset.id : null;
        if (!categoryId) {
            assetTagInput.value = '';
            return;
        }
        try {
            const response = await fetch(`/devices/api/categories/${categoryId}/next-asset-tag/`);
            if (response.ok) {
                const data = await response.json();
                assetTagInput.value = data.asset_tag;
            }
        } catch (error) {
            console.error('Error generating asset tag:', error);
        }
    }

    // Custom asset tag toggle
    if (customAssetTagCheckbox && assetTagInput) {
        customAssetTagCheckbox.addEventListener('change', function() {
            if (this.checked) {
                assetTagInput.removeAttribute('readonly');
                assetTagInput.value = '';
                assetTagInput.focus();
            } else {
                assetTagInput.setAttribute('readonly', '');
                generateAssetTag();
            }
        });

        // Auto-uppercase for manual input
        assetTagInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
        });
    }

    // Auto-generate hostname from serial number
    if (serialNumberInput && hostnameInput && customHostnameCheckbox) {
        serialNumberInput.addEventListener('input', function() {
            if (!customHostnameCheckbox.checked) {
                generateHostname();
            }
        });

        customHostnameCheckbox.addEventListener('change', function() {
            if (this.checked) {
                hostnameInput.removeAttribute('readonly');
            } else {
                hostnameInput.setAttribute('readonly', '');
                generateHostname();
            }
        });
    }

    // Category selection - filter and enable device model dropdown + auto-generate asset tag
    if (categorySelect && deviceModelSelect) {
        categorySelect.addEventListener('change', function() {
            const selectedCategory = this.value;

            // Auto-generate asset tag
            if (!customAssetTagCheckbox.checked) {
                generateAssetTag();
            }

            // Clear current options (except first placeholder)
            deviceModelSelect.innerHTML = '<option value="">Select Device Model</option>';

            if (selectedCategory) {
                // Enable dropdown and update helper text
                deviceModelSelect.disabled = false;
                deviceModelHelper.textContent = '';
                deviceModelHelper.classList.remove('text-muted');

                // Filter and add matching device models
                allDeviceModelOptions.forEach(option => {
                    if (option.dataset.category === selectedCategory) {
                        deviceModelSelect.appendChild(option.cloneNode(true));
                    }
                });

                // Check if no models available for this category
                if (deviceModelSelect.options.length === 1) {
                    deviceModelHelper.textContent = 'No device models available for this category';
                    deviceModelHelper.classList.add('text-warning');
                }
            } else {
                // Disable dropdown and show helper
                deviceModelSelect.disabled = true;
                deviceModelHelper.textContent = 'Please select a category first';
                deviceModelHelper.classList.add('text-muted');
                deviceModelHelper.classList.remove('text-warning');
            }

            // Clear any validation state
            deviceModelSelect.classList.remove('is-invalid');
        });
    }

    // Validate device model on form submit
    const form = document.querySelector('form[hx-post]');
    if (form && deviceModelSelect) {
        form.addEventListener('htmx:configRequest', function(e) {
            if (!deviceModelSelect.value) {
                e.preventDefault();
                deviceModelSelect.classList.add('is-invalid');
                return false;
            }
        });
        deviceModelSelect.addEventListener('change', function() {
            this.classList.remove('is-invalid');
        });
    }

    // Auto-load specifications when device model is selected
    if (deviceModelSelect) {
        deviceModelSelect.addEventListener('change', async function() {
            const modelId = this.value;
            if (!modelId) return;

            try {
                const response = await fetch(`/devices/api/models/${modelId}/`);
                if (response.ok) {
                    const data = await response.json();
                    const specs = data.specifications || {};

                    // Populate specification fields if they exist in the model
                    if (specs.CPUModel) document.getElementById('spec_cpu').value = specs.CPUModel;
                    if (specs.RAM) document.getElementById('spec_ram').value = specs.RAM;
                    if (specs.Storage) document.getElementById('spec_storage').value = specs.Storage;
                    if (specs.GPU) document.getElementById('spec_gpu').value = specs.GPU;
                    if (specs.Display) document.getElementById('spec_display').value = specs.Display;
                    if (specs.OperatingSystem) document.getElementById('spec_os').value = specs.OperatingSystem;
                }
            } catch (error) {
                console.error('Error loading device model specifications:', error);
            }
        });
    }
})();
</script>
