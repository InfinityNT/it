<!-- Category Add Form (replaces list view) -->
<div class="manage-add-form-section">
    <!-- Back Button -->
    <a class="manage-back-btn"
       hx-get="{% url 'manage-categories' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>

    <h6>Add New Category</h6>

    <form method="post" id="addCategoryForm"
          hx-post="{% url 'add-category' %}"
          hx-target="#dynamicModalContent"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="mb-3">
            <label for="name" class="form-label">Category Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="name" name="name" required
                   placeholder="e.g., Laptop, Desktop, Phone">
        </div>

        <div class="mb-3">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_general" id="is_general">
                <label class="form-check-label" for="is_general">
                    <strong>General Specification</strong>
                    <small class="text-muted d-block">Mark this category for general/shared specifications</small>
                </label>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Specification Fields</label>
            <small class="text-muted d-block mb-2">Define custom specifications for devices in this category</small>

            <div id="spec-fields-container" class="spec-fields-container">
                <!-- Spec fields will be added here dynamically -->
                <div class="text-center text-muted py-3" id="no-specs-message">
                    <small>No specification fields defined. Click "Add Specification" to create one.</small>
                </div>
            </div>

            <button type="button" class="btn btn-outline-secondary add-spec-field-btn" onclick="addSpecField()">
                <i class="bi bi-plus me-1"></i>Add Specification Field
            </button>
        </div>

        <div class="d-flex gap-2 justify-content-end mt-4">
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-categories' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus me-1"></i>Create Category
            </button>
        </div>
    </form>
</div>

<script>
let specFieldIndex = 0;

function addSpecField(name = '', label = '', type = 'text', options = '') {
    const container = document.getElementById('spec-fields-container');
    const noSpecsMessage = document.getElementById('no-specs-message');
    if (noSpecsMessage) noSpecsMessage.remove();

    const fieldId = specFieldIndex++;
    const fieldHtml = `
        <div class="spec-field-row" id="spec-field-${fieldId}">
            <input type="text" class="form-control form-control-sm spec-name-input"
                   name="spec_name[]" placeholder="Field name (e.g., CPUModel)"
                   value="${name}" required>
            <input type="text" class="form-control form-control-sm spec-label-input"
                   name="spec_label[]" placeholder="Display label (e.g., CPU Model)"
                   value="${label}">
            <select class="form-select form-select-sm spec-type-select"
                    name="spec_type[]" onchange="toggleOptionsInput(${fieldId}, this.value)">
                <option value="text" ${type === 'text' ? 'selected' : ''}>Text</option>
                <option value="number" ${type === 'number' ? 'selected' : ''}>Number</option>
                <option value="dropdown" ${type === 'dropdown' ? 'selected' : ''}>Dropdown</option>
            </select>
            <input type="text" class="form-control form-control-sm spec-options-input"
                   name="spec_options[]" placeholder="Options (comma separated)"
                   value="${options}" style="display: ${type === 'dropdown' ? 'block' : 'none'};">
            <button type="button" class="btn btn-outline-danger btn-sm btn-remove-spec"
                    onclick="removeSpecField(${fieldId})">
                <i class="bi bi-x"></i>
            </button>
        </div>
    `;

    container.insertAdjacentHTML('beforeend', fieldHtml);
}

function removeSpecField(fieldId) {
    const field = document.getElementById(`spec-field-${fieldId}`);
    if (field) field.remove();

    const container = document.getElementById('spec-fields-container');
    if (container.children.length === 0) {
        container.innerHTML = `
            <div class="text-center text-muted py-3" id="no-specs-message">
                <small>No specification fields defined. Click "Add Specification" to create one.</small>
            </div>
        `;
    }
}

function toggleOptionsInput(fieldId, type) {
    const field = document.getElementById(`spec-field-${fieldId}`);
    const optionsInput = field.querySelector('.spec-options-input');
    optionsInput.style.display = type === 'dropdown' ? 'block' : 'none';
    if (type !== 'dropdown') optionsInput.value = '';
}
</script>
