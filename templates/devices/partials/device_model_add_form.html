<!-- Device Model Add Form (replaces list view) -->
<div class="manage-add-form-section">
    <!-- Back Button -->
    <a class="manage-back-btn"
       hx-get="{% url 'manage-device-models' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>

    <h6>Add New Device Model</h6>

    <form method="post" id="addDeviceModelForm"
          hx-post="{% url 'add-device-model' %}"
          hx-target="#device-models-content"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
                <select class="form-select" id="add-model-category" name="category" required
                        hx-get="{% url 'get-spec-template' %}"
                        hx-target="#add-model-specifications-container"
                        hx-trigger="change"
                        hx-include="[name='category']">
                    <option value="">Select a category</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="manufacturer" class="form-label">Manufacturer <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="manufacturer" name="manufacturer" required
                       list="manufacturer-list" placeholder="e.g., Apple, Dell, HP">
                <datalist id="manufacturer-list">
                    {% for mfr in manufacturers %}
                    <option value="{{ mfr.name }}">
                    {% endfor %}
                </datalist>
            </div>
        </div>

        <div class="mb-3">
            <label for="model_name" class="form-label">Model Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="model_name" name="model_name" required
                   placeholder="e.g., MacBook Pro 14-inch, Latitude 7430">
        </div>

        <!-- Specifications Container (loaded via HTMX when category selected) -->
        <div id="add-model-specifications-container">
            <div class="text-muted text-center py-3 border rounded bg-light">
                <small><i class="bi bi-info-circle me-1"></i>Select a category to load specification fields</small>
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-end mt-4">
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-device-models' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus me-1"></i>Create Device Model
            </button>
        </div>
    </form>
</div>
