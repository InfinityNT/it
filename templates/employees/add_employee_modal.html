{% load static %}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Add New Employee</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form method="post"
      hx-post="{% url 'add-employee' %}"
      hx-target="#dynamicModalContent"
      hx-swap="outerHTML">
    {% csrf_token %}

    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="employee_id" class="form-label">Employee ID *</label>
                <input type="text" class="form-control" id="employee_id" name="employee_id" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="first_name" class="form-label">First Name *</label>
                <input type="text" class="form-control" id="first_name" name="first_name" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="last_name" class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="last_name" name="last_name" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="department" class="form-label">Department</label>
                <select class="form-select" id="department" name="department">
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="job_title" class="form-label">Job Title</label>
                <select class="form-select" id="job_title" name="job_title">
                    <option value="">Select Job Title</option>
                    {% for title in job_titles %}
                    <option value="{{ title.id }}">{{ title.title }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="work_phone" class="form-label">Work Phone</label>
                <input type="tel" class="form-control" id="work_phone" name="work_phone">
            </div>
            <div class="col-md-6 mb-3">
                <label for="work_email" class="form-label">Work Email</label>
                <input type="email" class="form-control" id="work_email" name="work_email">
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="create_system_user" name="create_system_user">
                    <label class="form-check-label" for="create_system_user">
                        Create system user account
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check me-1"></i>Save Employee
        </button>
    </div>
</form>
