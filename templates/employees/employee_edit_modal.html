{% load static %}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Edit Employee</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>

<form method="post"
      hx-post="{% url 'employee-edit' employee_id=employee.id %}"
      hx-target="#dynamicModalContent"
      hx-swap="outerHTML">
    {% csrf_token %}

    <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="first_name" class="form-label">First Name *</label>
                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ employee.first_name }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="last_name" class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ employee.last_name }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ employee.email }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="work_email" class="form-label">Work Email</label>
                <input type="email" class="form-control" id="work_email" name="work_email" value="{{ employee.work_email }}">
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="department" class="form-label">Department</label>
                <select class="form-select" id="department" name="department">
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}" {% if employee.department.id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label for="job_title" class="form-label">Job Title</label>
                <select class="form-select" id="job_title" name="job_title">
                    <option value="">Select Job Title</option>
                    {% for title in job_titles %}
                    <option value="{{ title.id }}" {% if employee.job_title.id == title.id %}selected{% endif %}>{{ title.title }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="work_phone" class="form-label">Work Phone</label>
                <input type="tel" class="form-control" id="work_phone" name="work_phone" value="{{ employee.work_phone }}">
            </div>
            <div class="col-md-6 mb-3">
                <label for="mobile_phone" class="form-label">Mobile Phone</label>
                <input type="tel" class="form-control" id="mobile_phone" name="mobile_phone" value="{{ employee.mobile_phone }}">
            </div>
        </div>

        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="2">{{ employee.notes }}</textarea>
        </div>
    </div>

    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-check me-1"></i>Save Changes
        </button>
    </div>
</form>
