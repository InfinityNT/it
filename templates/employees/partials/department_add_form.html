<!-- Add Department Form -->
<div class="add-department-form">
    <a class="manage-back-btn"
       hx-get="{% url 'manage-departments' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>
    <h6 class="mt-0">Add New Department</h6>

    <form method="post"
          hx-post="{% url 'manage-departments-add-form' %}"
          hx-target="#dynamicModalContent"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Department Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" required
                       placeholder="e.g., Information Technology">
            </div>
            <div class="col-md-6">
                <label class="form-label">Code <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="code" required
                       placeholder="e.g., IT" style="text-transform: uppercase" maxlength="20">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Department Manager</label>
            <select class="form-select" name="manager_employee_id">
                <option value="">No Manager</option>
                {% for emp in employees %}
                <option value="{{ emp.employee_id }}">{{ emp.get_full_name }} ({{ emp.employee_id }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="d-flex gap-2 pt-3 border-top">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check me-1"></i>Create Department
            </button>
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-departments' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </form>
</div>
