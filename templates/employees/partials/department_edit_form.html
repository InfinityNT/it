<!-- Edit Department Form -->
<div class="edit-department-form">
    <a class="manage-back-btn"
       hx-get="{% url 'manage-departments' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>
    <h6 class="mt-0">Edit Department: {{ department.name }}</h6>

    <form method="post"
          hx-post="{% url 'manage-departments-edit' department_id=department.id %}"
          hx-target="#dynamicModalContent"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Department Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" required
                       value="{{ department.name }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Code <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="code" required
                       value="{{ department.code }}" style="text-transform: uppercase" maxlength="20">
            </div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col-md-8">
                <label class="form-label">Department Manager</label>
                <select class="form-select" name="manager_employee_id">
                    <option value="">No Manager</option>
                    {% for emp in employees %}
                    <option value="{{ emp.employee_id }}" {% if department.manager_employee_id == emp.employee_id %}selected{% endif %}>
                        {{ emp.get_full_name }} ({{ emp.employee_id }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Status</label>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" name="is_active" id="dept_is_active"
                           {% if department.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="dept_is_active">Active</label>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 pt-3 border-top">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check me-1"></i>Save Changes
            </button>
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-departments' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </form>
</div>
