<!-- Add Job Title Form -->
<div class="add-job-title-form">
    <a class="manage-back-btn"
       hx-get="{% url 'manage-job-titles' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>
    <h6 class="mt-0">Add New Job Title</h6>

    <form method="post"
          hx-post="{% url 'manage-job-titles-add-form' %}"
          hx-target="#dynamicModalContent"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Job Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="title" required
                       placeholder="e.g., Software Engineer">
            </div>
            <div class="col-md-6">
                <label class="form-label">Department <span class="text-danger">*</span></label>
                <select class="form-select" name="department" required>
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="d-flex gap-2 pt-3 border-top">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check me-1"></i>Create Job Title
            </button>
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-job-titles' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </form>
</div>
