<!-- Edit Job Title Form -->
<div class="edit-job-title-form">
    <a class="manage-back-btn"
       hx-get="{% url 'manage-job-titles' %}"
       hx-target="#dynamicModalContent"
       hx-swap="innerHTML">
        <i class="bi bi-arrow-left"></i>Back to List
    </a>
    <h6 class="mt-0">Edit Job Title: {{ job_title.title }}</h6>

    <form method="post"
          hx-post="{% url 'manage-job-titles-edit' job_title_id=job_title.id %}"
          hx-target="#dynamicModalContent"
          hx-swap="innerHTML">
        {% csrf_token %}

        {% if error %}
        <div class="alert alert-danger alert-sm py-2 mb-3">
            <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
        </div>
        {% endif %}

        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Job Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="title" required
                       value="{{ job_title.title }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Department <span class="text-danger">*</span></label>
                <select class="form-select" name="department" required>
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}" {% if dept.id == job_title.department_id %}selected{% endif %}>
                        {{ dept.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Status</label>
            <div class="form-check mt-2">
                <input class="form-check-input" type="checkbox" name="is_active" id="jt_is_active"
                       {% if job_title.is_active %}checked{% endif %}>
                <label class="form-check-label" for="jt_is_active">Active</label>
            </div>
        </div>

        <div class="d-flex gap-2 pt-3 border-top">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check me-1"></i>Save Changes
            </button>
            <button type="button" class="btn btn-secondary"
                    hx-get="{% url 'manage-job-titles' %}"
                    hx-target="#dynamicModalContent"
                    hx-swap="innerHTML">
                Cancel
            </button>
        </div>
    </form>
</div>
