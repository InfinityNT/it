{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - {{ SYSTEM_NAME }}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Login-specific CSS -->
    <style>
        /* Login Overlay Styles - Moved from login_overlay.js and separate CSS files */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .login-overlay.show {
            opacity: 1;
            visibility: visible;
        }
        
        .login-modal {
            width: 100%;
            max-width: 420px;
            margin: 2rem;
            transform: translateY(50px);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .login-overlay.show .login-modal {
            transform: translateY(0);
        }
        
        .login-modal-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .login-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        
        .login-title {
            color: #2d3748;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: #718096;
            font-size: 0.95rem;
            margin-bottom: 0;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .input-label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .input-field {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }
        
        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: rgba(255, 255, 255, 0.95);
        }
        
        .input-field::placeholder {
            color: #a0aec0;
        }
        
        .login-button {
            width: 100%;
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        
        .login-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        
        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .button-text {
            transition: opacity 0.3s ease;
        }
        
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
        }
        
        .login-help {
            text-align: center;
        }
        
        .help-text {
            color: #718096;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .help-text:hover {
            color: #667eea;
        }
        
        .help-text strong {
            color: #2d3748;
        }
        
        /* Error message styling */
        .error-message {
            color: #dc2626;
            background: #fee2e2;
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
            border: 1px solid #fecaca;
            animation: slideDown 0.3s ease-out;
        }
        
        .login-form-container.error .input-field {
            border-color: #dc2626;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideUp {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <!-- Main Login Interface -->
    <div id="login-overlay" class="login-overlay show">
        <div class="login-modal">
            <div class="login-modal-content">
                <!-- Header -->
                <div class="login-header">
                    <div class="login-icon">💻</div>
                    <h1 class="login-title">{{ SYSTEM_NAME }}</h1>
                    <p class="login-subtitle">Sign in to your account</p>
                </div>

                <!-- Login Form -->
                <div class="login-form-container">
                    <form id="login-form" 
                          hx-post="/api/auth/login/" 
                          hx-swap="none">
                        
                        {% csrf_token %}
                        
                        <!-- Username Field -->
                        <div class="input-group">
                            <label for="username" class="input-label">Username</label>
                            <input type="text" 
                                   id="username" 
                                   name="username" 
                                   class="input-field"
                                   placeholder="Enter your username"
                                   required
                                   autocomplete="username"
                                   autofocus>
                        </div>
                        
                        <!-- Password Field -->
                        <div class="input-group">
                            <label for="password" class="input-label">Password</label>
                            <input type="password" 
                                   id="password" 
                                   name="password" 
                                   class="input-field"
                                   placeholder="Enter your password"
                                   required
                                   autocomplete="current-password">
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="login-button">
                            <span class="button-text">Sign In</span>
                            <div class="loading-spinner" style="display: none;">⏳</div>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Change Modal (shown when required) -->
    {% include 'components/forms/password_change_modal.html' %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Login Controller Script -->
    <script>
        class LoginController {
            constructor() {
                this.form = document.getElementById('login-form');
                this.overlay = document.getElementById('login-overlay');
                this.passwordModal = document.getElementById('passwordChangeModal');
                this.init();
            }

            init() {
                this.setupEventListeners();
            }

            setupEventListeners() {
                // Handle form submission
                if (this.form) {
                    this.form.addEventListener('submit', (e) => this.handleFormSubmit(e));
                }

                // Handle HTMX responses
                document.addEventListener('htmx:responseError', (e) => this.handleLoginError(e));
                document.addEventListener('htmx:afterRequest', (e) => this.handleLoginResponse(e));
                
                // Handle password change modal
                document.addEventListener('htmx:afterRequest', (e) => this.handlePasswordChangeResponse(e));
            }

            handleFormSubmit(event) {
                const button = this.form.querySelector('.login-button');
                const buttonText = button.querySelector('.button-text');
                const spinner = button.querySelector('.loading-spinner');
                
                // Show loading state
                button.disabled = true;
                buttonText.style.opacity = '0';
                spinner.style.display = 'block';
            }

            handleLoginError(event) {
                if (event.target.closest('#login-form')) {
                    this.resetButtonState();
                    this.showErrorMessage('Invalid credentials. Please try again.');
                }
            }

            handleLoginResponse(event) {
                if (event.target.closest('#login-form')) {
                    const response = event.detail.xhr;
                    if (response.status === 200) {
                        const responseData = JSON.parse(response.responseText);
                        
                        if (responseData.password_change_required) {
                            // Show password change modal
                            this.showPasswordChangeModal();
                        } else {
                            // Login successful - redirect to dashboard
                            this.showSuccessAndRedirect();
                        }
                    }
                }
            }

            handlePasswordChangeResponse(event) {
                if (event.target.closest('#password-change-form')) {
                    const response = event.detail.xhr;
                    if (response.status === 200) {
                        const responseData = JSON.parse(response.responseText);
                        if (responseData.success) {
                            // Password changed successfully - redirect to dashboard
                            this.hidePasswordChangeModal();
                            this.showSuccessAndRedirect();
                        }
                    }
                }
            }

            showPasswordChangeModal() {
                this.resetButtonState();
                const modal = new bootstrap.Modal(this.passwordModal);
                modal.show();
            }

            hidePasswordChangeModal() {
                const modal = bootstrap.Modal.getInstance(this.passwordModal);
                if (modal) {
                    modal.hide();
                }
            }

            resetButtonState() {
                const button = this.form.querySelector('.login-button');
                const buttonText = button.querySelector('.button-text');
                const spinner = button.querySelector('.loading-spinner');
                
                button.disabled = false;
                buttonText.style.opacity = '1';
                spinner.style.display = 'none';
            }

            showSuccessAndRedirect() {
                const button = this.form.querySelector('.login-button');
                const buttonText = button.querySelector('.button-text');
                const spinner = button.querySelector('.loading-spinner');
                
                buttonText.textContent = '✓ Success!';
                buttonText.style.opacity = '1';
                spinner.style.display = 'none';
                button.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }

            showErrorMessage(message) {
                // Remove existing error message
                const existingError = this.overlay.querySelector('.error-message');
                if (existingError) {
                    existingError.remove();
                }
                
                // Create error message
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = message;
                
                // Insert after form
                const formContainer = this.overlay.querySelector('.login-form-container');
                formContainer.appendChild(errorDiv);
                
                // Add error animation to form
                formContainer.classList.add('error');
                setTimeout(() => {
                    formContainer.classList.remove('error');
                }, 500);
                
                // Auto-remove after 5 seconds
                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.style.animation = 'slideUp 0.3s ease-out';
                        setTimeout(() => errorDiv.remove(), 300);
                    }
                }, 5000);
            }
        }

        // Initialize login controller when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            new LoginController();
        });
    </script>
</body>
</html>
